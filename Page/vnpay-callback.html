<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả thanh toán VNPay — TripleT</title>
    <link rel="stylesheet" href="../Css/badminton-base.css">
    <link rel="stylesheet" href="../Css/home.css">
    <style>
        .vnpay-cb-wrap {
            max-width: 560px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .success { color: #28a745; }
        .error { color: #dc3545; }

        .vnpay-cb-wrap h1 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .vnpay-cb-wrap p {
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .info-table {
            text-align: left;
            background: var(--cream);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="vnpay-cb-wrap">
        <div id="status-icon" class="status-icon">⏳</div>
        <h1 id="status-title">Đang kiểm tra kết quả...</h1>
        <p id="status-desc">Vui lòng đợi trong giây lát khi chúng tôi xác nhận giao dịch.</p>

        <div class="info-table" id="payment-info" style="display: none;">
            <div class="info-item"><span>Mã giao dịch:</span> <strong id="vnp-txn"></strong></div>
            <div class="info-item"><span>Số tiền:</span> <strong id="vnp-amount"></strong></div>
            <div class="info-item"><span>Nội dung:</span> <strong id="vnp-info"></strong></div>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="Home.html" class="btn btn-primary">Về trang chủ</a>
            <a href="OrderHistory.html" id="btn-history" class="btn" style="background:#eee; display:none;">Xem đơn hàng</a>
        </div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const responseCode = urlParams.get('vnp_ResponseCode');
            const amount = urlParams.get('vnp_Amount');
            const txnRef = urlParams.get('vnp_TxnRef');
            const orderInfo = urlParams.get('vnp_OrderInfo');

            const titleEl = document.getElementById('status-title');
            const descEl = document.getElementById('status-desc');
            const iconEl = document.getElementById('status-icon');
            const infoBox = document.getElementById('payment-info');

            if (responseCode === null) {
                titleEl.textContent = "Không tìm thấy thông tin";
                descEl.textContent = "Có vẻ như bạn đã truy cập trực tiếp vào trang này.";
                return;
            }

            // Hiển thị thông tin cơ bản
            infoBox.style.display = 'block';
            document.getElementById('vnp-txn').textContent = txnRef;
            document.getElementById('vnp-amount').textContent = (parseInt(amount) / 100).toLocaleString('vi-VN') + '₫';
            document.getElementById('vnp-info').textContent = decodeURIComponent(orderInfo).replace(/\+/g, ' ');

            // Kiểm tra mã phản hồi VNPay
            if (responseCode === "00") {
                // THÀNH CÔNG
                iconEl.textContent = "✅";
                iconEl.className = "status-icon success";
                titleEl.textContent = "Thanh toán thành công!";
                titleEl.classList.add("success");
                descEl.textContent = "Cảm ơn bạn đã tin tưởng TripleT. Đơn hàng của bạn đang được xử lý.";
                document.getElementById('btn-history').style.display = 'inline-block';
                
                // Xóa giỏ hàng vì đã thanh toán xong
                localStorage.removeItem("triplet_cart_v1");
            } else {
                // THẤT BẠI (hoặc người dùng hủy)
                iconEl.textContent = "❌";
                iconEl.className = "status-icon error";
                titleEl.textContent = "Thanh toán không thành công";
                titleEl.classList.add("error");
                
                const errorMap = {
                    "24": "Giao dịch không thành công do bạn đã hủy giao dịch.",
                    "11": "Giao dịch không thành công do hết hạn chờ thanh toán.",
                    "default": "Đã có lỗi xảy ra trong quá trình thanh toán. Vui lòng thử lại."
                };
                descEl.textContent = errorMap[responseCode] || errorMap["default"];
            }
        })();
    </script>
</body>

</html>
