<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - TripleT</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  background: linear-gradient(135deg,#0f3d2e,#1f6f54);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.container{
  width:400px;
  background:rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  padding:35px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  animation: fadeIn 0.6s ease;
  text-align:center;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
  font-size:24px;
  font-weight:bold;
  color:#1f6f54;
  margin-bottom:10px;
}

h2{
  margin-bottom:25px;
  color:#0f3d2e;
}

/* INPUT */
.input-group{
  margin-bottom:18px;
  text-align:left;
}

.input-group label{
  font-size:13px;
  color:#555;
}

.input-group input{
  width:100%;
  padding:12px 40px 12px 12px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ddd;
  transition:0.3s;
}

.input-group input:focus{
  border-color:#1f6f54;
  box-shadow:0 0 8px rgba(31,111,84,0.3);
}

/* ICON MẮT */
.password-box{
  position:relative;
}

.password-box i{
  position:absolute;
  right:12px;
  top:38px;
  cursor:pointer;
  color:#777;
}

/* BUTTON */
.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:30px;
  background: linear-gradient(135deg,#1f6f54,#145c44);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform: translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* LINK GẠCH CHÂN */
.link{
  position: relative;
  color:#1f6f54;
  cursor:pointer;
  display:inline-block;
}

.link::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-3px;
  width:0%;
  height:2px;
  background:#1f6f54;
  transition:0.3s;
}

.link:hover::after{
  width:100%;
}

/* TEXT */
.extra{
  margin-top:15px;
}

.toggle{
  margin-top:10px;
}

/* SOCIAL */
.social{
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 20px; /* 👉 cách đều */
}

.icon{
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.3s;
}

/* ICON BÊN TRONG */
.icon i{
  font-size: 18px;
  color: #333;
}

/* HOVER */
.icon:hover{
  background: #1f6f54;
}

.icon:hover i{
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">🏸 TripleT</div>
  <h2 id="title">Đăng nhập</h2>

  <form onsubmit="return false">

    <div class="input-group">
      <label>Email / Số điện thoại</label>
      <input type="email" required>
    </div>

    <div class="input-group password-box">
      <label>Mật khẩu</label>
      <input type="password" id="password" required>
      <i class="fa-solid fa-eye" onclick="togglePassword(this)"></i>
    </div>

    <div class="input-group password-box" id="confirmBox" style="display:none;">
      <label>Xác nhận mật khẩu</label>
      <input type="password" id="confirmPassword">
      <i class="fa-solid fa-eye" onclick="toggleConfirm(this)"></i>
    </div>

    <button class="btn" id="btnText">Đăng nhập</button>

  </form>

  <!-- QUÊN MẬT KHẨU -->
  <div class="extra">
    <span class="link">Quên mật khẩu?</span>
  </div>

  <!-- KHÔNG LỆCH NỮA -->
  <div class="toggle">
    <span>Chưa có tài khoản? </span>
    <span class="link" onclick="toggleForm()" id="toggleText">Đăng ký</span>
  </div>

  <div class="social">
  <div class="icon"><i class="fab fa-google"></i></div>
  <div class="icon"><i class="fab fa-facebook-f"></i></div>
  <div class="icon"><i class="fab fa-github"></i></div>
</div>

</div>

<script>
let isLogin = true;

function togglePassword(el){
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
  el.classList.toggle("fa-eye-slash");
}

function toggleConfirm(el){
  const input = document.getElementById("confirmPassword");
  input.type = input.type === "password" ? "text" : "password";
  el.classList.toggle("fa-eye-slash");
}

function toggleForm(){
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Đăng nhập" : "Đăng ký";
  document.getElementById("btnText").innerText = isLogin ? "Đăng nhập" : "Đăng ký";
  document.getElementById("confirmBox").style.display = isLogin ? "none" : "block";
  document.getElementById("toggleText").innerText = isLogin ? "Đăng ký" : "Đăng nhập";
}
</script>

</body>
</html>
