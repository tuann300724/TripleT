<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - TripleT</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../Css/badminton-base.css" />
  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    /* BODY */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #0f3d2e, #1f6f54);
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 0;
    }

    .container {
      width: 400px;
      max-width: 90%;
      padding: 35px;
      text-align: center;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #1f6f54;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 25px;
      color: #0f3d2e;
    }

    .input-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .input-group label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 40px 12px 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #1f6f54;
      box-shadow: 0 0 8px rgba(31, 111, 84, 0.3);
      outline: none;
    }

    /* PASSWORD BOX - ĐÃ CĂN CHỈNH LẠI CON MẮT */
    .password-box {
      position: relative;
    }

    .password-box i {
      position: absolute;
      /* Đưa xuống giữa theo chiều dọc của phần tử cha */
      top: 70%;
      right: 15px;
      transform: translateY(-50%);
      cursor: pointer;
      color: #777;
      z-index: 10;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #1f6f54, #145c44);
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .link {
      position: relative;
      color: #1f6f54;
      cursor: pointer;
      font-weight: 600;
    }

    .link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0;
      height: 2px;
      background: #1f6f54;
      transition: 0.3s;
    }

    .link:hover::after {
      width: 100%;
    }

    .extra,
    .toggle {
      margin-top: 15px;
    }

    .social {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .icon {
      width: 45px;
      height: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: #f2f2f2;
      cursor: pointer;
      transition: 0.3s;
    }

    .icon i {
      font-size: 18px;
      color: #333;
    }

    .icon:hover {
      background: #1f6f54;
    }

    .icon:hover i {
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="top-bar">
    Miễn phí vận chuyển đơn từ 500.000₫ · Tư vấn chọn vợt miễn phí
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a href="Home.html" class="logo">
        <span class="logo-mark">🏸</span>
        <span>TripleT Cầu Lông</span>
      </a>

      <nav class="nav-main" id="nav-menu">
        <a href="Home.html" aria-current="page">Trang chủ</a>
        <a href="tin-tuc.html">Tin tức</a>
        <a href="san-pham.html">Sản phẩm</a>
        <a href="Home.html#khuyen-mai">Khuyến mãi</a>
        <a href="Home.html#lien-he">Liên hệ</a>
      </nav>

      <div class="header-actions">
        

        <a href="login.html" class="btn btn-primary" id="login-btn">Đăng nhập</a>
      
        <button type="button" class="menu-toggle" id="menu-toggle">
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="logo">🏸 TripleT</div>
      <h2 id="title">Đăng nhập</h2>

      <form id="authForm">
        <div class="input-group">
          <label>Email / Số điện thoại</label>
          <input type="text" id="username" placeholder="Nhập email hoặc SĐT" required />
        </div>
        <div class="input-group" id="nameBox" style="display: none">
          <label>Họ và tên</label>
          <input type="text" id="name" placeholder="Nhập họ và tên" />
        </div>
        <div class="input-group password-box">
          <label>Mật khẩu</label>
          <input type="password" id="password" required placeholder="Nhập mật khẩu" />
          <i class="fa-solid fa-eye" onclick="togglePassword(this, 'password')"></i>
        </div>

        <div class="input-group password-box" id="confirmBox" style="display: none">
          <label>Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu" />
          <i class="fa-solid fa-eye" onclick="togglePassword(this, 'confirmPassword')"></i>
        </div>

        <button type="submit" class="btn" id="btnText">Đăng nhập</button>
      </form>

      <div class="extra" id="forgotPass">
        <span class="link">Quên mật khẩu?</span>
      </div>

      <div class="toggle">
        <span id="questionText">Chưa có tài khoản? </span>
        <span class="link" onclick="toggleForm()" id="toggleText">Đăng ký</span>
      </div>

      <div class="social">
        <div class="icon"><i class="fab fa-google"></i></div>
        <div class="icon"><i class="fab fa-facebook-f"></i></div>
        <div class="icon"><i class="fab fa-github"></i></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>
      © 2026 <strong>TripleT Cầu Lông</strong> ·
      <a href="https://github.com/tuann300724/TripleT" target="_blank" rel="noopener noreferrer">GitHub</a>
    </p>
  </footer>

  <script>
    let isLogin = true;

    // Hàm ẩn/hiện mật khẩu dùng chung
    function togglePassword(el, inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === "password" ? "text" : "password";
      el.classList.toggle("fa-eye");
      el.classList.toggle("fa-eye-slash");
    }

    function toggleForm() {
      isLogin = !isLogin;

      // Cập nhật nội dung text
      document.getElementById("title").innerText = isLogin
        ? "Đăng nhập"
        : "Đăng ký";
      document.getElementById("btnText").innerText = isLogin
        ? "Đăng nhập"
        : "Đăng ký";
      document.getElementById("toggleText").innerText = isLogin
        ? "Đăng ký"
        : "Đăng nhập";

      // Cập nhật câu hỏi (Yêu cầu của bạn)
      document.getElementById("questionText").innerText = isLogin
        ? "Chưa có tài khoản? "
        : "Đã có tài khoản? ";

      // Ẩn/Hiện ô xác nhận mật khẩu, quên mật khẩu, và họ tên
      // Ẩn/hiện và cập nhật required cho các trường đăng ký
      const confirmBox = document.getElementById("confirmBox");
      const confirmInput = document.getElementById("confirmPassword");
      const nameBox = document.getElementById("nameBox");
      const nameInput = document.getElementById("name");
      if (isLogin) {
        confirmBox.style.display = "none";
        nameBox.style.display = "none";
        document.getElementById("forgotPass").style.display = "block";
        confirmInput.removeAttribute("required");
        nameInput.removeAttribute("required");
        // Đảm bảo input ẩn không bị required khi submit
        confirmInput.value = "";
        nameInput.value = "";
      } else {
        confirmBox.style.display = "block";
        nameBox.style.display = "block";
        document.getElementById("forgotPass").style.display = "none";
        confirmInput.setAttribute("required", "required");
        nameInput.setAttribute("required", "required");
      }
      // Reset form khi chuyển đổi
      document.getElementById("authForm").reset();
    }

    // Xử lý Validation khi Submit
    // Xử lý Validation và Chuyển hướng khi Submit
    document
      .getElementById("authForm")
      .addEventListener("submit", function (e) {
        e.preventDefault();
        const role = 'user'; // Mặc định role là 'user' khi đăng ký

        let name = '';
        if (!isLogin) {
          name = document.getElementById("name").value.trim();
        }
        const username = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;
        const confirmPass = document.getElementById("confirmPassword").value;

        // 1. Kiểm tra định dạng Email hoặc SĐT
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^(0[3|5|7|8|9])([0-9]{8})$/;

        if (!emailRegex.test(username) && !phoneRegex.test(username)) {
          alert(
            "Vui lòng nhập đúng định dạng Email hoặc Số điện thoại (10 chữ số)!",
          );
          return;
        }

        // 2. Lấy danh sách tài khoản từ localStorage (nếu chưa có thì tạo mảng rỗng)
        let users = JSON.parse(localStorage.getItem("tripleT_users")) || [];

        if (isLogin) {
          // --- LOGIC ĐĂNG NHẬP ---
          // Tìm xem tài khoản và mật khẩu có khớp trong danh sách đã lưu không
          const userExists = users.find(
            (u) => u.username === username && u.password === pass,
          );

          if (userExists) {
            // Lưu user hiện tại vào localStorage
            localStorage.setItem("tripleT_currentUser", JSON.stringify(userExists));

            // Tạo hộp thư (ib) cho user nếu chưa có
            let ibs = JSON.parse(localStorage.getItem("tripleT_ibs")) || {};
            if (!ibs[userExists.username]) {
              ibs[userExists.username] = [];
              localStorage.setItem("tripleT_ibs", JSON.stringify(ibs));
            }

            alert("Đăng nhập thành công! Đang chuyển hướng...");
            window.location.href = "home.html";
          } else {
            alert(
              "Tài khoản hoặc mật khẩu không chính xác. Vui lòng đăng ký trước!",
            );
          }
        } else {
          // --- LOGIC ĐĂNG KÝ ---
          if (pass !== confirmPass) {
            alert("Mật khẩu xác nhận không khớp!");
            return;
          }
          if (!name) {
            alert("Vui lòng nhập họ và tên!");
            return;
          }
          // Kiểm tra xem tài khoản này đã tồn tại chưa
          const isDuplicate = users.some((u) => u.username === username);
          if (isDuplicate) {
            alert("Tài khoản này đã được đăng ký trước đó!");
            return;
          }

          // Tạo id duy nhất cho user (dùng timestamp + random)
          const userId = 'user_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
          // Lưu tài khoản mới vào mảng, có cả role, name, id
          const newUser = { id: userId, username: username, password: pass, role: role, name: name };
          users.push(newUser);
          localStorage.setItem("tripleT_users", JSON.stringify(users));



          alert("Đăng ký thành công! Bây giờ bạn có thể đăng nhập.");
          toggleForm(); // Chuyển về form đăng nhập
        }
      });
  </script>
  <script src="../JavaScript/cart.js"></script>
</body>

</html>
