<!DOCTYPE html>
<html lang="vi">
<link>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TripleT Admin · Quản trị cửa hàng cầu lông</title>
    <!-- Google Font + Font Awesome + Chart.js -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
   <style src="style.css"> </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginView" class="login-container">
    <div class="login-card">
        <div class="login-logo">🏸 TripleT <span>ADMIN</span></div>
        <h2>Đăng nhập hệ thống</h2>
        <p style="color:#475569;">Quản trị cửa hàng cầu lông</p>
        <div class="input-group">
            <label>Tài khoản</label>
            <input type="text" id="adminUser" placeholder="admin" value="admin">
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="adminPass" placeholder="••••••" value="admin123">
        </div>
        <button class="btn-login" id="doLoginBtn">Đăng nhập <i class="fas fa-arrow-right"></i></button>
        <div id="loginError" class="error-msg"></div>
        <div style="margin-top: 1rem; font-size: 12px; color: #6c757d;">🔐 demo: admin / admin123</div>
    </div>
</div>

<!-- ADMIN DASHBOARD (ẨN ban đầu) -->
<div id="adminApp" style="display: none;">
    <div class="admin-wrapper">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-badminton"></i> TripleT Admin
            </div>
            <ul class="sidebar-menu">
                <li data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
                <li data-section="categories"><i class="fas fa-tags"></i> Loại sản phẩm</li>
                <li data-section="products"><i class="fas fa-racket"></i> Sản phẩm</li>
                <li data-section="news"><i class="fas fa-newspaper"></i> Tin tức</li>
                <li data-section="users"><i class="fas fa-users"></i> Người dùng</li>
                <li data-section="orders"><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
                <li data-section="revenue"><i class="fas fa-chart-line"></i> Doanh thu</li>
            </ul>
            <div class="logout-side" style="padding: 1rem 1.5rem;">
                <li style="list-style: none; padding:0;" id="logoutAdminBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</li>
            </div>
        </div>
        <div class="main-content">
            <div class="topbar">
                <i class="fas fa-bars menu-icon" id="mobileMenuToggle"></i>
                <h2 class="page-title" id="mainTitle">Dashboard</h2>
                <div><i class="fas fa-user-circle"></i> Admin</div>
            </div>
            <div id="dynamicContent">Loading...</div>
        </div>
    </div>
</div>

<!-- MODAL CRUD CHUNG -->
<div id="genericModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Thêm mới</h3>
        <form id="modalForm">
            <div id="modalFields"></div>
            <div class="form-buttons">
                <button type="button" class="btn-icon" id="modalCloseBtn">Hủy</button>
                <button type="submit" class="btn-add" style="margin:0;">Lưu</button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
